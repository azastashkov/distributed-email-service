events {}

http {
    upstream web_backends {
        # max_fails=0 keeps both backends in rotation even if a deploy temporarily
        # makes one unreachable. Health is observed by Prometheus, not nginx.
        server web-server-1:8080 max_fails=0;
        server web-server-2:8080 max_fails=0;
    }

    log_format upstream_log '$remote_addr - "$request" $status upstream=$upstream_addr time=${request_time}s';
    access_log /var/log/nginx/access.log upstream_log;

    server {
        listen 80;

        location / {
            proxy_pass         http://web_backends;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
        }
    }
}
