spring:
  application:
    name: load-client
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 0  # we don't need an HTTP server (only management)

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9100}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      service: load
      instance: ${INSTANCE_ID:load-local}
    distribution:
      percentiles-histogram:
        loadclient.op.duration: true
        loadclient.ws.delivery.lag: true

load:
  target-web-url: ${LOAD_TARGET_WEB_URL:http://localhost:28080}
  target-ws-url: ${LOAD_TARGET_WS_URL:ws://localhost:28090/ws}
  users: ${LOAD_USERS:50}
  duration-seconds: ${LOAD_DURATION_SECONDS:300}
  ramp-seconds: ${LOAD_RAMP_SECONDS:30}
  start-delay-seconds: ${LOAD_START_DELAY_SECONDS:10}
  mix:
    sendNoAtt: 20
    sendWithAtt: 5
    listFolder: 30
    getEmail: 20
    markRead: 10
    listUnread: 10
    search: 5
